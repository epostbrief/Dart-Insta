<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TSV Pilsting – Dart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #1a6b3c;
      --green-light: #228b4e;
      --gold:   #c9a84c;
      --gold-light: #e8c96a;
      --dark:   #0f1f15;
      --card-bg: #162b1d;
      --text:   #f0ede4;
      --muted:  #8aab94;
      --radius: 14px;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HEADER ───────────────────────────────── */
    header {
      width: 100%;
      background: #0c1a11;
      border-bottom: 2px solid var(--green);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-slot {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-slot img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .logo-placeholder-text {
      font-size: 9px;
      color: var(--muted);
      text-align: center;
      line-height: 1.3;
    }

    .header-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .header-club {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--gold);
      line-height: 1;
    }

    /* ── MAIN ───────────────────────────────────*/
    main {
      flex: 1;
      width: 100%;
      max-width: 680px;
      padding: 48px 24px 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* ── TILE GRID ──────────────────────────── */
    .tile-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .tile {
      background: var(--card-bg);
      border: 1.5px solid #2a4030;
      border-radius: var(--radius);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      transition: border-color .2s, transform .15s, background .2s;
      position: relative;
      overflow: hidden;
    }

    .tile::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(201,168,76,.06) 0%, transparent 60%);
      opacity: 0;
      transition: opacity .2s;
    }

    .tile:hover {
      border-color: var(--gold);
      background: #1c3825;
      transform: translateY(-3px);
    }

    .tile:hover::before {
      opacity: 1;
    }

    .tile:active {
      transform: translateY(0);
    }

    .tile-icon {
      width: 44px;
      height: 44px;
      background: rgba(201,168,76,.12);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
    }

    .tile-icon svg {
      width: 22px;
      height: 22px;
    }

    .tile-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 1.5px;
      color: var(--text);
      line-height: 1.1;
    }

    .tile-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .tile-arrow {
      margin-top: auto;
      color: var(--gold);
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity .2s, transform .2s;
    }

    .tile:hover .tile-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* ── FOOTER ─────────────────────────────── */
    footer {
      padding: 16px;
      font-size: 12px;
      color: #3d5a44;
      text-align: center;
    }
  </style>
</head>
